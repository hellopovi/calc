<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage vs Rent LT</title>
  <style>
    :root {
      --primary: #1a73e8;
      --success: #1e8e3e;
      --error: #d93025;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
    }
    body { 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      background: var(--bg); 
      color: #3c4043; 
      margin: 0; 
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container { 
      width: 100%; 
      max-width: 500px; 
    }
    h2 { 
      font-size: 20px; 
      color: var(--primary); 
      margin: 0 0 20px 0; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .live-tag { font-size: 10px; background: #e6f4ea; color: var(--success); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--success); }
    .card { 
      background: var(--card-bg); 
      padding: 16px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
      border: 1px solid #dadce0; 
      margin-bottom: 16px; 
    }
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .full-width { grid-column: span 2; }
    label { font-size: 11px; font-weight: 700; color: #70757a; display: block; text-transform: uppercase; margin-bottom: 6px; }
    select, input { 
      width: 100%; 
      padding: 10px; 
      border: 1px solid #dadce0; 
      border-radius: 6px; 
      box-sizing: border-box; 
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: var(--primary); ring: 2px solid #c2e7ff; }
    
    .results { margin-top: 10px; }
    .res-section { margin-bottom: 12px; padding: 15px; border-radius: 10px; }
    .bg-main { background: #e8f0fe; border: 1px solid #c2e7ff; }
    .bg-comp { background: #fdfefe; border: 1px solid #e0e0e0; }
    
    .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .res-item:last-child { margin-bottom: 0; }
    .label-text { color: #5f6368; }
    .val { font-weight: bold; color: #202124; font-size: 16px; }
    .loan-highlight { color: var(--primary); font-size: 18px; }
    
    .comparison-text { font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 5px; }
    .explanation { font-size: 12px; color: #70757a; line-height: 1.4; text-align: center; }
    
    .warning { 
      color: var(--error); 
      font-size: 12px; 
      margin-top: 10px; 
      padding: 10px; 
      background: #fdf2f2; 
      border-radius: 6px; 
      border-left: 4px solid var(--error); 
    }
    
    @media (max-width: 400px) {
      .input-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>LT Mortgage Pro <span class="live-tag">LIVE</span></h2>
    
    <div class="card">
      <div class="input-grid">
        <div class="full-width">
          <label>Bank Preset</label>
          <select id="bankSelect">
            <option value="custom">Custom</option>
            <option value="swed">Swedbank (1.4%)</option>
            <option value="seb">SEB (1.45% - 20yr)</option>
            <option value="big">BigBank (1.8%)</option>
            <option value="citadele" selected>Citadele (1.85%)</option>
          </select>
        </div>
        <div class="full-width">
          <label>Apartment Price</label>
          <input type="number" id="price" value="200000">
        </div>
        <div>
          <label>Downpayment %</label>
          <input type="number" id="downPercent" value="30">
        </div>
        <div>
          <label>Term (Years)</label>
          <input type="number" id="years" value="28">
        </div>
        <div class="full-width">
          <label>Total Interest (Margin + Euribor)</label>
          <input type="number" id="interest" step="0.001">
        </div>
      </div>
    </div>

    <div class="results">
      <div class="res-section bg-main">
        <div class="res-item">
          <span class="label-text">Loan Amount:</span> 
          <span class="val loan-highlight" id="resLoan">€0</span>
        </div>
        <div class="res-item">
          <span class="label-text">Monthly Payment:</span> 
          <span class="val" id="resMonthly">€0</span>
        </div>
      </div>

      <div class="res-section bg-comp">
        <div class="comparison-text" id="comparison">Calculating...</div>
        <div class="explanation">
          <strong>Mortgage vs Rent:</strong> This compares your monthly bank payment against the estimated rent for a similar €200k apartment in Lithuania (approx. 5.5% annual yield).
        </div>
      </div>

      <div class="card" style="box-shadow: none; background: transparent; border-style: dashed;">
        <div class="res-item"><span>Downpayment Sum:</span> <span class="val" id="resDown">€0</span></div>
        <div class="res-item"><span>Total Interest Paid:</span> <span class="val" id="resTotalInterest">€0</span></div>
        <div class="res-item"><span>Total Cost of Home:</span> <span class="val" id="resTotalCost">€0</span></div>
      </div>
      
      <div id="bankWarning" class="warning" style="display:none;"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
